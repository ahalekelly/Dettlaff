name: Build Dyno Executables
on:
  push:
    branches: [ master ]
    paths:
      - 'dyno/dyno.py'
      - '.github/workflows/build_dyno.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'dyno/dyno.py'
      - '.github/workflows/build_dyno.yml'
  workflow_dispatch:  # Keep manual trigger option

jobs:
  build:
    timeout-minutes: 30
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            output_name: dyno.exe
          - os: macos-latest
            output_name: dyno
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
      timeout-minutes: 5
    
    - name: Set up Python
      uses: actions/setup-python@v5
      timeout-minutes: 5
      with:
        python-version: '3.10'
    
    - name: Install pyinstaller
      timeout-minutes: 10
      run: |
        pip install --timeout 600 -v --no-cache-dir pyinstaller~=6.11

    - name: Install pyserial
      timeout-minutes: 10
      run: |
        pip install --timeout 600 -v --no-cache-dir pyserial~=3.5

    - name: Install matplotlib
      timeout-minutes: 10
      run: |
        pip install --timeout 600 -v --no-cache-dir matplotlib~=3.9.3
    
    - name: Ensure bin directory exists
      run: mkdir -p dyno/bin

    - name: Build executable (MacOS)
      timeout-minutes: 10
      shell: bash
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --name dyno \
                    --onefile \
                    --distpath dyno/bin \
                    dyno/dyno.py
    
    - name: Build executable (Windows)
      timeout-minutes: 10
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        pyinstaller --name dyno --onefile --distpath dyno/bin dyno/dyno.py
    
    - name: Handle executable
      timeout-minutes: 5
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv dyno/bin/dyno.exe dyno/bin/dyno-windows.exe
        else
          mv dyno/bin/dyno dyno/bin/dyno-mac
          chmod +x dyno/bin/dyno-mac
        fi
    
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
    
    - name: Commit and push changes
      run: |
        git add dyno/bin/
        git commit -m "Build executable for ${{ matrix.os }}" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
