name: Build Executables

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            output_name: dyno.exe
          - os: macos-latest
            output_name: dyno

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install matplotlib>=3.9.0 pyserial>=3.5 pyinstaller~=6.11 --timeout 300

    - name: Build executable
      run: |
        pyinstaller --name dyno \
                    --onedir \
                    --distpath dyno \
                    dyno/dyno.py

    - name: Rename executable
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv dyno/dyno/dyno.exe dyno/${{ matrix.output_name }}
        else
          mv dyno/dyno/dyno dyno/${{ matrix.output_name }}
        fi
      shell: bash

    - name: Clean up build artifacts
      run: |
        rm -rf dyno/dyno
      shell: bash

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dyno-${{ matrix.os }}
        path: dyno/${{ matrix.output_name }}
